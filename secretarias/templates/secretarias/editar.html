{% extends 'dashboard/base.html' %}

{% block content %}

<div class="page-header">

    <div>

        <h1>
            Editar Secretária
        </h1>

        <p>
            Atualize os médicos vinculados à secretária.
        </p>

    </div>

</div>

<div class="form-card">

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>
                Usuário
            </label>

            {{ form.usuario }}

        </div>

        <div class="form-group">

            <label>
                Médicos Vinculados
            </label>

            <div class="checkbox-container">

                {{ form.medicos }}

            </div>

        </div>

        <div class="actions">

            <button
                type="submit"
                class="btn-salvar"
            >
                💾 Salvar Alterações
            </button>

            <a
                href="{% url 'listar_secretarias' %}"
                class="btn-cancelar"
            >
                Cancelar
            </a>

        </div>

    </form>

</div>

<style>

.page-header{

    margin-bottom:25px;
}

.page-header h1{

    font-size:40px;
    margin-bottom:5px;
}

.page-header p{

    color:#888;
}

.form-card{

    background:#1d1d1d;

    border:1px solid #2c2c2c;

    border-radius:14px;

    padding:30px;

    max-width:900px;
}

.form-group{

    margin-bottom:25px;
}

.form-group label{

    display:block;

    margin-bottom:10px;

    font-weight:600;
}

.form-group select{

    width:100%;

    background:#252525;

    color:white;

    border:1px solid #333;

    padding:12px;

    border-radius:8px;
}

.checkbox-container{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(250px,1fr));

    gap:12px;

    margin-top:10px;
}

.checkbox-container label{

    background:#252525;

    border:1px solid #333;

    border-radius:10px;

    padding:12px;

    cursor:pointer;
}

.actions{

    display:flex;

    gap:10px;

    margin-top:20px;
}

.btn-salvar{

    background:#4f8cff;

    color:white;

    border:none;

    padding:12px 18px;

    border-radius:8px;

    cursor:pointer;
}

.btn-cancelar{

    background:#444;

    color:white;

    text-decoration:none;

    padding:12px 18px;

    border-radius:8px;
}

</style>

{% endblock %}
