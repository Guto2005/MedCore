<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>MedCore Workspace</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% load static %}

    <!-- Cornerstone -->

    <script src="https://unpkg.com/cornerstone-core/dist/cornerstone.js"></script>

    <script src="https://unpkg.com/dicom-parser/dist/dicomParser.js"></script>

    <script src="https://unpkg.com/hammerjs/hammer.js"></script>

    <script src="https://unpkg.com/cornerstone-math/dist/cornerstoneMath.js"></script>

    <script src="https://unpkg.com/cornerstone-tools/dist/cornerstoneTools.js"></script>

    <script src="{% static 'libs/cornerstone/cornerstoneWADOImageLoader.bundle.min.js' %}"></script>

    <script>
        console.log("CORNERSTONE:", cornerstone);
        console.log("WADO:", cornerstoneWADOImageLoader);
    </script>

    <script>

        cornerstoneWADOImageLoader.external.cornerstone =
            cornerstone;

        cornerstoneTools.external.cornerstone =
            cornerstone;

        cornerstoneTools.external.Hammer =
            Hammer;

        cornerstoneTools.init();

    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #111;

            color: white;

            font-family: Segoe UI;

            height: 100vh;

            overflow: hidden;
        }

        .workspace {

            height: 100vh;

            display: flex;

            flex-direction: column;
        }

        .toolbar {

            height: 55px;

            background: #1a1a1a;

            border-bottom: 1px solid #2f2f2f;

            display: flex;

            align-items: center;

            gap: 8px;

            padding: 0 15px;
        }

        .toolbar button {

            background: #2b2b2b;

            color: white;

            border: 1px solid #444;

            border-radius: 8px;

            padding: 8px 12px;

            cursor: pointer;

            transition: 0.2s;
        }

        .toolbar button:hover {

            background: #3c3c3c;
        }

        .body {

            flex: 1;

            display: flex;
        }

        .series-panel {

            width: 220px;

            background: #181818;

            overflow: auto;
        }

        .viewer-panel {

            flex: 1;

            position: relative;

            background: #000;

            overflow: hidden;
        }

        .report-panel {

            width: 450px;

            min-width: 450px;

            background: #1d1d1d;

            border-left: 1px solid #333;

            overflow-y: auto;

            padding: 20px;
        }

        #dicomImage {

            width: 100%;

            height: 100%;
        }

        .workspace-body {

            flex: 1;

            display: flex;

            overflow: hidden;
        }

        .series-panel {
            width: 260px;

            background: #181818;

            border-right: 1px solid #333;

            overflow-y: auto;

            flex-shrink: 0;
        }

        .series-scroll {

            padding: 10px;
        }

        .series-card {

            background: #222;

            border: 1px solid #333;

            border-radius: 10px;

            padding: 8px;

            margin-bottom: 12px;

            transition: .2s;
        }

        .series-card:hover {

            border-color: #4f8cff;
        }

        .series-card img {

            width: 100%;

            border-radius: 6px;
        }

        .series-card span {

            display: block;

            margin-top: 6px;

            font-size: 12px;
        }

        .viewer-panel {

            flex: 1;

            background: black;

            position: relative;
        }

        #dicomImage {

            width: 100%;

            height: 100%;

            display: flex;

            align-items: center;

            justify-content: center;
        }

        .dicom-preview {

            max-width: 100%;

            max-height: 100%;
        }

        .report-panel {

            width: 380px;

            background: #202020;

            border-left: 1px solid #333;

            padding: 20px;

            overflow-y: auto;
        }

        .report-panel textarea {

            width: 100%;

            background: #111;

            color: white;

            border: 1px solid #333;

            border-radius: 8px;

            padding: 10px;

            margin-bottom: 15px;
        }

        .actions {

            display: flex;

            gap: 10px;

            margin-top: 15px;
        }

        .actions button {

            padding: 10px;

            border: none;

            border-radius: 8px;

            cursor: pointer;
        }

        .status-bar {

            height: 35px;

            background: #181818;

            border-top: 1px solid #333;

            display: flex;

            align-items: center;

            padding: 0 15px;

            font-size: 13px;
        }

        .overlay {

            position: absolute;

            color: #ffd84d;

            font-size: 12px;

            z-index: 10;
        }

        .top-left {

            top: 10px;

            left: 10px;
        }

        .top-right {

            top: 10px;

            right: 10px;
        }

        .bottom-left {

            bottom: 10px;

            left: 10px;
        }

        .bottom-right {

            bottom: 10px;

            right: 10px;
        }
    </style>

</head>

<body>

{% block content %}

<div class="workspace">

    <div class="toolbar">
        ferramentas
    </div>

    <div class="body">

        <div class="series-panel">
        </div>

        <div class="viewer-panel">
            <div id="dicomImage"></div>
        </div>

        <div class="report-panel">
            formulário
        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}
{% endblock %}

</body>
</html>
