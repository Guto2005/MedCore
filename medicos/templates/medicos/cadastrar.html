{% extends 'dashboard/base.html' %}

{% block content %}

<style>

    .form-card {

        background: #1d1d1d;

        border: 1px solid #2c2c2c;

        border-radius: 14px;

        padding: 25px;

        max-width: 900px;
    }

    .form-title {

        margin-bottom: 25px;
    }

    .form-grid {

        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 20px;
    }

    .form-group {

        display: flex;

        flex-direction: column;
    }

    label {

        margin-bottom: 6px;

        font-size: 14px;

        color: #ccc;
    }

    input,
    select {

        background: #252525;

        border: 1px solid #333;

        border-radius: 8px;

        padding: 12px;

        color: white;
    }

    .acoes-formulario {

        margin-top: 25px;

        display: flex;

        gap: 10px;
    }

    .btn-salvar {

        background: #4f8cff;

        color: white;

        border: none;

        padding: 12px 20px;

        border-radius: 8px;

        cursor: pointer;

        font-weight: bold;
    }

</style>

<div class="form-card">

    <h1 class="form-title">

        Cadastrar Médico

    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">

                <label>Médico</label>

                {{ form.usuario }}

                {% if form.usuario.help_text %}
                    <small style="color:#ffb74d; margin-top:8px;">
                        {{ form.usuario.help_text }}
                    </small>
                {% endif %}

            </div>

            <div class="form-group">

                <label>CRM</label>

                {{ form.crm }}

            </div>

            <div class="form-group">

                <label>Especialidade</label>

                {{ form.especialidade }}

            </div>

            <div class="form-group">

                <label>Telefone</label>

                {{ form.telefone }}

            </div>

        </div>

        <div class="acoes-formulario">

            <button
                type="submit"
                name="acao"
                value="salvar"
                class="btn-salvar"
            >
                Salvar
            </button>

            <button
                type="submit"
                name="acao"
                value="novo"
                class="btn-salvar"
            >
                Salvar e Adicionar Outro
            </button>

        </div>

    </form>

</div>

{% endblock %}
