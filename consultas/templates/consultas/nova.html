{% extends 'dashboard/base.html' %}

{% block content %}

<style>

    .form-card {

        background:#1d1d1d;

        border:1px solid #2c2c2c;

        border-radius:14px;

        padding:25px;

        max-width:800px;
    }

    .form-group {

        margin-bottom:20px;
    }

    .form-group label {

        display:block;

        margin-bottom:8px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {

        width:100%;

        background:#252525;

        color:white;

        border:1px solid #333;

        padding:12px;

        border-radius:8px;
    }

    .btn-salvar {

        background:#4f8cff;

        color:white;

        border:none;

        padding:12px 18px;

        border-radius:8px;

        cursor:pointer;
    }

</style>

<div class="form-card">

<h1>

    Nova Consulta

</h1>

<br>

<form method="POST">

    {% csrf_token %}

    <div class="form-group">

        <label>
            Paciente
        </label>

        {{ form.paciente }}

    </div>

    <div class="form-group">

        <label>
            Médico
        </label>

        {{ form.medico }}

    </div>

    <div class="form-group">

        <label>
            Data e Hora
        </label>

        {{ form.data_hora }}

    </div>

    <div class="form-group">

        <label>
            Status
        </label>

        {{ form.status }}

    </div>

    <div class="form-group">

        <label>
            Observações
        </label>

        {{ form.observacoes }}

    </div>

    <button
        type="submit"
        class="btn-salvar"
    >

        Salvar Consulta

    </button>

</form>

</div>

{% endblock %}
