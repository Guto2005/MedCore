<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Login - MedCore</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#121212;

            color:white;

            font-family:Segoe UI,sans-serif;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;
        }

        .login-card{

            width:400px;

            background:#1d1d1d;

            border:1px solid #2d2d2d;

            border-radius:15px;

            padding:35px;
        }

        .logo{

            text-align:center;

            margin-bottom:30px;
        }

        .logo h1{

            font-size:38px;
        }

        .logo span{

            color:#4f8cff;
        }

        .logo p{

            color:#999;

            margin-top:5px;
        }

        .form-group{

            margin-bottom:15px;
        }

        label{

            display:block;

            margin-bottom:5px;
        }

        input{

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

            background:#2a2a2a;

            color:white;
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

            background:#4f8cff;

            color:white;

            font-weight:bold;

            cursor:pointer;

            margin-top:10px;
        }

        button:hover{

            opacity:.9;
        }

        .erro{

            color:#ff6b6b;

            margin-bottom:15px;

            text-align:center;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo">

            <h1>
                <span>✚</span> MedCore
            </h1>

            <p>
                Tecnologia Hospitalar
            </p>

        </div>

        {% if messages %}

            {% for message in messages %}

                <div class="erro">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>
                    Usuário
                </label>

                <input
                    type="text"
                    name="username"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Senha
                </label>

                <input
                    type="password"
                    name="password"
                    required
                >

            </div>

            <button type="submit">

                Entrar

            </button>

        </form>

    </div>

</body>

</html>
